<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexto</title>
<link rel="stylesheet" href="4file.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <div class="logo-circle"></div>
                <span class="logo-text">Nexto</span>
            </div>
            <a href="5admin.html" class="admin-link">Admin</a>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <h1 class="title">File d'attente</h1>

            <!-- Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="col-numero">Numéro</th>
                            <th class="col-service">Service</th>
                            <th class="col-statut">Statut</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>A23</td>
                            <td>Dépôt</td>
                            <td class="col-statut"><span class="badge badge-en-cours">En cours</span></td>
                        </tr>
                        <tr>
                            <td>A24</td>
                            <td>Retrait</td>
                            <td class="col-statut"><span class="badge badge-en-attente">En attente</span></td>
                        </tr>
                        <tr>
                            <td>A22</td>
                            <td>Dépôt</td>
                            <td class="col-statut"><span class="badge badge-termine">Terminé</span></td>
                        </tr>
                        <tr>
                            <td>A25</td>
                            <td>Consultation</td>
                            <td class="col-statut"><span class="badge badge-en-attente">En attente</span></td>
                        </tr>
                        <tr>
                            <td>A26</td>
                            <td>Retrait</td>
                            <td class="col-statut"><span class="badge badge-en-attente">En attente</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Wait time -->
            <div class="wait-time-box">
                Temps d'attente estimé : 12 minutes
            </div>

            <!-- Centered Refresh button -->
            <div class="refresh-container">
                <a href="4file.html" class="refresh-btn">Actualiser</a>
            </div>
        </main>
    </div>
</body>
