<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="3ticket.css">
</head>
<body>
     <div class="site-container">
        <nav class="navbar">
            <div class="logo">
                <span class="logo-circle"></span>
                Nexto
            </div>
            <div class="nav-links">
                <a href="1landing.html">Accueil</a>
                <a href="#">Contact</a>
            </div>
        </nav>

        <main class="main-content">
            <div class="header-text">
                <h1>Ticket généré</h1>
                <p>Votre ticket a été créé avec succès</p>
            </div>

            <div class="ticket-card">
                <div class="ticket-number">B12</div>
                
                <div class="divider"></div>
                
                <div class="ticket-info">
                    <div class="info-group">
                        <span class="label">SERVICE</span>
                        <span class="value">Etat Civil</span>
                    </div>
                    <div class="info-group">
                        <span class="label">HEURE DU TICKET</span>
                        <span class="value">14:23</span>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="status-button">
                    Veuillez attendre votre tour
                </div>
            </div>

            <button class="btn-back">Retour à l'accueil</button>

            <footer class="footer-text">
                Vous serez notifié lorsque ce sera votre tour. Gardez votre numéro de ticket visible.
            </footer>
        </main>
    </div>
</body>
</html>
